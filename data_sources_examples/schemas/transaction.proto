syntax = "proto3";

import "shared.proto";

package interview.transactions;

message TransactionEnvelope {
  int64 event_ts = 1;
  int64 occurred_ts = 2;
  shared.EventType event_type = 3;
  Transaction payload = 4;
}

message Transaction {
  string transaction_id = 1;
  string article_id = 2;
  string user_id = 3;
  int64 total_amount_cents = 4;
  TransactionType transaction_type = 7;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  PURCHASE = 1;
  REFUND = 2;
}
